services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    # Host networking is required for homelab routing/NAT (bridge mode often breaks LAN access).
    network_mode: host
    environment:
      INSECURE: ${INSECURE:-true}
      PORT: ${PORT:-51821}
      HOST: ${HOST:-0.0.0.0}
      DISABLE_IPV6: ${DISABLE_IPV6:-true}
      INIT_ENABLED: ${INIT_ENABLED:-true}
      INIT_USERNAME: ${INIT_USERNAME:-}
      INIT_PASSWORD: ${INIT_PASSWORD:-}
      INIT_HOST: ${INIT_HOST:-}
      INIT_PORT: ${INIT_PORT:-51820}
      INIT_DNS: ${INIT_DNS:-1.1.1.1}
      INIT_ALLOWED_IPS: ${INIT_ALLOWED_IPS:-10.8.0.0/24,192.168.1.0/24}
    volumes:
      - ./data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
